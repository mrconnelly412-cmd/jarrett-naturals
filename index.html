<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">

<title>Jarrett Naturals — Skin · Hair · Beard</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f5f0;--card:#fff;--dark:#111;--mid:#555;--light:#999;--border:#e5e1da;--accent:#2d5a3d;--accent2:#3d7a52;--accent-bg:rgba(45,90,61,.06);--accent-border:rgba(45,90,61,.15);--r:10px;--rl:16px;--gold:#c8a23d;--warn:#c44;--hair:#4a6fa5;--hair-bg:rgba(74,111,165,.08);--beard:#8b5a2b;--beard-bg:rgba(139,90,43,.08)}
html{font-size:16px;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--dark);line-height:1.55;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
h1,h2,h3{font-family:Georgia,'Times New Roman',serif;font-weight:400;line-height:1.15}
button,input,textarea{font-family:inherit;border:none;outline:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
a{color:var(--accent);text-decoration:none}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(247,245,240,.97);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;max-width:800px;margin:0 auto}
.brand{font-family:Georgia,'Times New Roman',serif;font-size:1.35rem;color:var(--dark);letter-spacing:-.02em;cursor:pointer}
.topnav{display:flex;gap:12px}
.topnav-btn{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);background:none;padding:6px 10px;border-radius:100px;cursor:pointer;transition:.15s;border:1px solid transparent}
.topnav-btn:hover,.topnav-btn:active{color:var(--accent);border-color:var(--accent-border);background:var(--accent-bg)}
.topnav-btn.active{color:var(--accent);background:var(--accent-bg);border-color:var(--accent)}

.page{padding:68px 16px 24px;max-width:600px;margin:0 auto;min-height:100vh}
.sec{margin-bottom:28px}
.lbl{font-size:.6rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.lbl-hair{color:var(--hair)}
.lbl-beard{color:var(--beard)}
.card{background:var(--card);border-radius:var(--rl);padding:20px;border:1px solid var(--border);margin-bottom:12px}
.divider{height:1px;background:var(--border);margin:24px 0}

.back-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:100px;font-size:.75rem;font-weight:600;color:var(--mid);cursor:pointer;transition:.15s}
.back-btn:hover,.back-btn:active{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.back-arrow{font-size:.9rem}

.hero{padding:36px 0 16px;text-align:center}
.hero h1{font-size:2.4rem;letter-spacing:-.03em;margin-bottom:10px;color:var(--dark)}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero-sub{font-size:.95rem;color:var(--mid);margin-bottom:24px;max-width:380px;margin-left:auto;margin-right:auto}
.hero-stat{font-size:.7rem;color:var(--light);margin-top:12px;letter-spacing:.02em}
.hero-note{font-size:.72rem;color:var(--mid);margin-top:16px;padding:12px;background:var(--accent-bg);border-radius:var(--r);border:1px solid var(--accent-border);line-height:1.5;text-align:left;max-width:400px;margin-left:auto;margin-right:auto}
.hero-note b{color:var(--accent)}

.cats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.cat{border-radius:var(--rl);padding:28px 14px 18px;text-align:center;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:.15s}
.cat:active{border-color:var(--accent);background:var(--accent-bg)}
.cat-title{font-family:Georgia,'Times New Roman',serif;font-size:1rem;color:var(--dark);margin-bottom:2px}
.cat-sub{font-size:.7rem;color:var(--light)}

.btn{display:inline-block;padding:14px 32px;border-radius:100px;font-size:.85rem;font-weight:600;letter-spacing:.02em;cursor:pointer;text-align:center;transition:.15s}
.btn-dark{background:var(--dark);color:#fff}
.btn-dark:active{background:#333}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--dark)}
.btn-outline:active{border-color:var(--accent);color:var(--accent)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:active{background:var(--accent2)}
.btn-full{display:block;width:100%}
.btn-sm{padding:10px 20px;font-size:.8rem}

.pbar{display:flex;gap:5px;margin-bottom:20px}
.pdot{flex:1;height:3px;background:var(--border);border-radius:2px}.pdot.on{background:var(--accent)}.pdot.done{background:var(--dark)}
.q-t{font-family:Georgia,'Times New Roman',serif;font-size:1.3rem;margin-bottom:3px}
.q-s{font-size:.85rem;color:var(--mid);margin-bottom:18px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.opt{padding:16px 10px;border:1.5px solid var(--border);border-radius:var(--r);text-align:center;font-weight:500;font-size:.85rem;background:var(--card);cursor:pointer;transition:.12s}
.opt:active,.opt.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.qnav{display:flex;justify-content:space-between;margin-top:18px}
.quiz-cat-label{font-size:.55rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:inline-block;padding:3px 10px;background:var(--accent-bg);border-radius:100px}

.profile{background:var(--dark);border-radius:var(--rl);padding:24px;color:#fff;margin-bottom:16px}
.profile h3{font-size:1.5rem;margin-bottom:2px;font-family:Georgia,'Times New Roman',serif}
.profile .sub{font-size:.7rem;opacity:.5;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.profile p{font-size:.85rem;opacity:.8;line-height:1.6}
.ptags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.ptag{padding:3px 10px;background:rgba(255,255,255,.1);border-radius:100px;font-size:.6rem;font-weight:600;letter-spacing:.04em}

.p-cat{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.pstep{display:inline-block;padding:2px 8px;background:var(--accent-bg);border-radius:4px;font-size:.55rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.pname{font-family:Georgia,'Times New Roman',serif;font-size:1.05rem;color:var(--dark);margin-bottom:2px}
.pbrand{font-size:.7rem;color:var(--light);margin-bottom:6px}
.pdesc{font-size:.8rem;color:var(--mid);line-height:1.55;margin-bottom:8px}
.pills{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px}
.pill{padding:2px 7px;background:var(--bg);border-radius:4px;font-size:.55rem;font-weight:600;color:var(--accent)}
.rating{display:flex;align-items:center;gap:5px;margin-bottom:6px;font-size:.75rem}
.stars{color:var(--gold);letter-spacing:1px;font-size:.7rem}
.pprice{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:8px}
.pprice span{font-size:.7rem;font-weight:400;color:var(--light)}
.links{display:flex;flex-direction:column;gap:5px}
.shopbtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1px solid var(--border);border-radius:var(--r);font-size:.8rem;font-weight:600;color:var(--mid);background:var(--card);text-decoration:none}
.shopbtn:active{border-color:var(--accent);color:var(--accent)}
.sdot{width:5px;height:5px;border-radius:50%}
.sd-a{background:#ff9900}

.why-box{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.why-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.why-text{font-size:.78rem;color:var(--dark);line-height:1.55}
.why-text b{color:var(--accent)}

.cause-box{background:#fff8e6;border:1px solid #e8d7a8;border-radius:var(--r);padding:12px;margin-bottom:10px}
.cause-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8b6914;margin-bottom:6px}
.cause-text{font-size:.78rem;color:var(--dark);line-height:1.55}

.tabs{display:flex;gap:3px;background:var(--border);border-radius:100px;padding:3px;margin-bottom:14px}
.tab{flex:1;padding:9px;border-radius:100px;font-size:.75rem;font-weight:600;color:var(--mid);background:transparent;text-align:center;cursor:pointer;transition:.1s}
.tab.on{background:var(--card);color:var(--dark);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.rgroup{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin:14px 0 6px;padding-left:2px}
.rgroup:first-child{margin-top:0}
.rstep{padding:12px 14px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:6px}
.rst-time{font-size:.55rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:2px}
.rst-h{font-weight:600;color:var(--dark);font-size:.88rem;margin-bottom:2px}
.rst-d{font-size:.78rem;color:var(--mid);line-height:1.5}
.rst-p{font-size:.68rem;color:var(--accent);font-weight:600;margin-top:3px}

.tweek{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:10px}
.tday{text-align:center;padding:10px 2px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--card);cursor:pointer}
.tday:active{border-color:var(--accent)}
.tday.chk{background:var(--accent-bg);border-color:var(--accent)}
.tday.now{box-shadow:inset 0 0 0 2px var(--accent)}
.tday.fut{opacity:.3;pointer-events:none}
.tday .dn{font-size:.5rem;font-weight:700;text-transform:uppercase;color:var(--light)}
.tday .dd{font-size:.9rem;font-weight:700;color:var(--dark);margin:2px 0}
.tday .dc{font-size:.7rem}
.tday.chk .dc{color:var(--accent)}
.srow{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.sbox{background:var(--bg);border-radius:var(--r);padding:10px;text-align:center}
.sbox-n{font-family:Georgia,'Times New Roman',serif;font-size:1.2rem;color:var(--dark)}
.sbox-l{font-size:.55rem;font-weight:700;text-transform:uppercase;color:var(--light);letter-spacing:.06em}

.crow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:.8rem}
.crow:last-child{border-bottom:none}
.ctot{display:flex;justify-content:space-between;padding:12px 0;border-top:2px solid var(--dark);margin-top:6px}
.ctot span:first-child{font-weight:700}.ctot span:last-child{font-family:Georgia,'Times New Roman',serif;font-size:1.2rem}

.note{width:100%;min-height:56px;padding:10px;border:1px solid var(--border);border-radius:var(--r);font-size:.85rem;color:var(--dark);background:var(--card);resize:vertical}
.info{background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:var(--r);padding:12px;font-size:.78rem;color:var(--dark);line-height:1.55;margin-top:8px}
.info b{color:var(--accent)}
.info-hair{background:var(--hair-bg);border-color:rgba(74,111,165,.2)}
.info-hair b{color:var(--hair)}
.info-beard{background:var(--beard-bg);border-color:rgba(139,90,43,.2)}
.info-beard b{color:var(--beard)}
.chart{display:flex;align-items:flex-end;gap:4px;height:80px;margin-top:8px}
.cbar{flex:1;display:flex;flex-direction:column;align-items:center;height:100%}
.cfill{width:100%;border-radius:3px 3px 0 0;transition:.3s}
.cval{font-size:.55rem;font-weight:700;color:var(--dark);margin-bottom:2px}
.clbl{font-size:.5rem;color:var(--light);margin-top:2px}
.ms{display:flex;flex-wrap:wrap;gap:4px}
.badge{padding:4px 10px;border-radius:100px;font-size:.6rem;font-weight:600}
.badge-on{background:var(--accent);color:#fff}
.badge-off{background:var(--bg);color:var(--light);border:1px solid var(--border)}
.hidden{visibility:hidden}
.foot{text-align:center;padding:36px 16px;border-top:1px solid var(--border);margin-top:28px}
.foot h3{font-size:1.2rem;color:var(--dark);margin-bottom:4px}
.foot p{font-size:.8rem;color:var(--mid);margin-bottom:10px}
.foot-b{font-size:.6rem;color:var(--light)}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fade .25s ease-out}

.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:8px 12px;background:var(--bg);border-radius:var(--r)}
.week-nav-btn{padding:6px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;font-size:.75rem;font-weight:600;color:var(--mid);cursor:pointer}
.week-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.week-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.week-nav-label{font-size:.75rem;font-weight:600;color:var(--dark)}
.edit-badge{display:inline-block;padding:2px 6px;background:var(--gold);color:#fff;border-radius:4px;font-size:.5rem;font-weight:700;margin-left:6px}

.tracker-type-tabs{display:flex;gap:4px;margin-bottom:12px}
.tracker-type-tab{flex:1;padding:8px;border-radius:var(--r);font-size:.7rem;font-weight:600;text-align:center;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--mid);transition:.15s}
.tracker-type-tab.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.tracker-type-tab.hair.active{background:var(--hair-bg);border-color:var(--hair);color:var(--hair)}
.tracker-type-tab.beard.active{background:var(--beard-bg);border-color:var(--beard);color:var(--beard)}

.store-note{background:#fff8e6;border:1px solid #e8d7a8;border-radius:var(--r);padding:10px;margin-bottom:16px;font-size:.75rem;color:#8b6914;text-align:center}
.store-note b{color:#6b5210}
</style>
</head>

{q:"Scalp condition?",s:"How does your scalp feel most days?",o:[{l:"Oily / Greasy",v:"oily"},{l:"Dry / Flaky",v:"dry"},{l:"Itchy / Irritated",v:"scalp"},{l:"Normal / Balanced",v:"normal"}]},

cl_sens:{cat:"SKINCARE",step:"Cleanser",nm:"Sensitive Face Wash",br:"Bulldog Skincare",ds:"Ultra-gentle with baobab, oat oil, willow herb. No fragrance, no irritation.",hl:["Fragrance-Free","Oat-Based","Vegan"],st:4.6,rv:"8,400+",pr:"$8",la:"~2.5 mo",lk:[{s:"Amazon",u:"https://www.amazon.com/dp/B0791WG5YG",c:"sd-a"}],why:{sens:"Sensitive skin reacts to fragrances and sulfates. This oat-based formula cleanses gently while calming inflammation."}},

function getBeardCauseExplanation(concern,texture){if(concern==='itch')return"<b>Beard itch</b> happens because facial hair is coarser than head hair and draws moisture from the skin beneath. As hair grows, it can also curl back and irritate skin. The products below hydrate both beard and skin.";if(concern==='dry')return"<b>Beard dryness and beardruff</b> occur when the skin under your beard doesn't get enough moisture. Unlike your scalp, this skin isn't used to being covered. Deep-conditioning oils and balms restore the moisture barrier.";if(concern==='growth')return"<b>Patchy beard growth</b> is largely genetic, but you can optimize conditions for growth. Keeping follicles healthy with jojoba oil and avoiding breakage helps your beard look fuller.";if(concern==='style')return"<b>Beard manageability</b> depends on keeping hair soft and providing hold without stiffness. Keratin proteins repair damage while natural waxes in balm provide all-day control.";return"<b>Beard care</b> is about maintaining the hair and the skin beneath. Unlike head hair, beard hair is thicker and more porous, requiring richer oils and dedicated products.";}

// TRACKER FUNCTIONS
function gT(type){const key=type==="hair"?"jn4_hair":type==="beard"?"jn4_beard":"jn4";const raw=localStorage.getItem(key);const def={s:new Date().toISOString().slice(0,10),w:{}};if(!raw)return def;try{return JSON.parse(raw)}catch{return def}}
function sT(d,type){const key=type==="hair"?"jn4_hair":type==="beard"?"jn4_beard":"jn4";localStorage.setItem(key,JSON.stringify(d))}
function getWeekKey(startDate,offset=0){const d=new Date(startDate);d.setDate(d.getDate()-d.getDay()+offset*7);return d.toISOString().slice(0,10);}
function getWeekNumber(startDateStr,weekKey){const start=new Date(startDateStr);const week=new Date(weekKey);const diff=Math.floor((week-start)/(7*24*60*60*1000));return diff+1;}
function getDaysOfWeek(weekKey){const d=new Date(weekKey);const days=[];for(let i=0;i<7;i++){const day=new Date(d);day.setDate(d.getDate()+i);days.push({key:day.toISOString().slice(0,10),dn:['S','M','T','W','T','F','S'][i],dd:day.getDate()});}return days;}

function rTracker(trackerType){
const m=$("#tmount");if(!m)return;
const d=gT(trackerType);
const ns=new Date().toISOString().slice(0,10);
const currentWeekKey=getWeekKey(ns);
const allWeeks=Object.keys(d.w).filter(k=>d.w[k].sv).sort((a,b)=>new Date(a)-new Date(b));
if(!allWeeks.includes(currentWeekKey))allWeeks.push(currentWeekKey);
const displayWeekKey=st.editWeek||currentWeekKey;
const isCurrentWeek=displayWeekKey===currentWeekKey;
const weekData=d.w[displayWeekKey]||{d:{},n:"",sv:false};
const days=getDaysOfWeek(displayWeekKey);
const checked=Object.values(weekData.d).filter(Boolean).length;
const wn=getWeekNumber(d.s,displayWeekKey);
const colorVar=trackerType==="hair"?"var(--hair)":trackerType==="beard"?"var(--beard)":"var(--accent)";
const bgClass=trackerType==="hair"?"info-hair":trackerType==="beard"?"info-beard":"";
const typeLabel=trackerType==="hair"?"Hair Care":trackerType==="beard"?"Beard Care":"Skincare";

let h=`<div class="tabs"><button class="tab ${st.tt==='now'?'on':''}" data-t="now">This Week</button><button class="tab ${st.tt==='history'?'on':''}" data-t="history">History</button></div>`;

if(st.tt==='now'){
const idx=allWeeks.indexOf(displayWeekKey);
const canPrev=idx>0;
const canNext=idx<allWeeks.length-1&&!isCurrentWeek;
h+=`<div class="week-nav"><button class="week-nav-btn" id="prevWeek" ${canPrev?'':'disabled'}>← Prev</button><span class="week-nav-label">Week ${wn}${!isCurrentWeek?'<span class="edit-badge">Editing</span>':''}</span><button class="week-nav-btn" id="nextWeek" ${canNext?'':'disabled'}>Next →</button></div>`;
h+=`<div class="tweek">`;days.forEach(day=>{const isToday=day.key===ns;const isFuture=new Date(day.key)>new Date(ns);const isChecked=weekData.d[day.key];h+=`<div class="tday${isChecked?' chk':''}${isToday?' now':''}${isFuture?' fut':''}" data-dk="${day.key}"><div class="dn">${day.dn}</div><div class="dd">${day.dd}</div><div class="dc">${isChecked?'✓':'○'}</div></div>`});h+=`</div>`;
h+=`<div class="srow"><div class="sbox"><div class="sbox-n" style="color:${colorVar}">${checked}/7</div><div class="sbox-l">Days Done</div></div><div class="sbox"><div class="sbox-n">${Math.round((checked/7)*100)}%</div><div class="sbox-l">This Week</div></div></div>`;
h+=`<textarea class="note" id="nt" placeholder="Notes for this week...">${weekData.n||''}</textarea>`;
const btnLabel=weekData.sv?"Update Week":"Save Week";
h+=`<button class="btn btn-accent btn-full btn-sm" id="svW" style="margin-top:10px;background:${colorVar}">${btnLabel}</button>`;
h+=`<div class="info ${bgClass}" style="margin-top:10px"><b>Tip:</b> Tap a day to mark it complete. Save your week to track progress over time!</div>`;
}else{
const saved=Object.entries(d.w).filter(([,w])=>w.sv);
const tW=saved.length,tD=saved.reduce((s,[,w])=>s+Object.values(w.d).filter(Boolean).length,0);
const avg=tW?Math.round(tD/(tW*7)*100):0;
const best=saved.reduce((b,[,w])=>{const x=Object.values(w.d).filter(Boolean).length;return x>b?x:b},0);
h+=`<div class="card"><div class="srow"><div class="sbox"><div class="sbox-n">${tW}</div><div class="sbox-l">Weeks</div></div><div class="sbox"><div class="sbox-n">${tD}</div><div class="sbox-l">Total Days</div></div><div class="sbox"><div class="sbox-n">${avg}%</div><div class="sbox-l">Avg Rate</div></div><div class="sbox"><div class="sbox-n">${best}/7</div><div class="sbox-l">Best Week</div></div></div>`;
if(saved.length){const sorted=saved.sort(([a],[b])=>new Date(a)-new Date(b));h+=`<div style="font-size:.65rem;font-weight:700;margin-bottom:6px">Consistency</div><div class="chart">`;sorted.forEach(([wkey,wd])=>{const x=Object.values(wd.d).filter(Boolean).length;const pc=(x/7)*100;const wn2=getWeekNumber(d.s,wkey);h+=`<div class="cbar"><div class="cval">${x}</div><div class="cfill" style="height:${Math.max(pc,5)}%;background:${pc>=80?colorVar:pc>=50?'var(--mid)':'var(--border)'}"></div><div class="clbl">W${wn2}</div></div>`});h+=`</div>`}else h+=`<div class="info ${bgClass}" style="text-align:center">Save your first week to see insights.</div>`;
h+=`<div style="font-size:.65rem;font-weight:700;margin:10px 0 6px">Milestones</div><div class="ms">`;
[{l:"Week 1",r:1},{l:"2 Weeks",r:2},{l:"1 Month",r:4},{l:"Perfect Week",r:-1,c:best>=7},{l:"Consistency",r:-1,c:avg>=80&&tW>=3}].forEach(mi=>{const on=mi.r>0?tW>=mi.r:mi.c;h+=`<span class="badge ${on?'badge-on':'badge-off'}" style="${on?`background:${colorVar}`:''}">${mi.l}${on?' ✓':''}</span>`});h+=`</div></div>`}

h+=`<div style="text-align:center;margin-top:10px"><button style="background:none;border:none;color:var(--light);font-size:.6rem;cursor:pointer" id="resetT">Reset ${typeLabel} Tracking Data</button></div>`;
m.innerHTML=h;

$$("[data-t]",m).forEach(b=>b.onclick=()=>{st.tt=b.dataset.t;if(b.dataset.t!=='now')st.editWeek=null;rTracker(trackerType)});
$$("[data-dk]",m).forEach(b=>b.onclick=()=>{const dk=b.dataset.dk;const dd=gT(trackerType);if(!dd.w[displayWeekKey])dd.w[displayWeekKey]={d:{},n:"",sv:false};dd.w[displayWeekKey].d[dk]=!dd.w[displayWeekKey].d[dk];sT(dd,trackerType);rTracker(trackerType);});
const prevBtn=$("#prevWeek",m);const nextBtn=$("#nextWeek",m);
if(prevBtn)prevBtn.onclick=()=>{const idx=allWeeks.indexOf(displayWeekKey);if(idx>0){st.editWeek=allWeeks[idx-1];rTracker(trackerType);}};
if(nextBtn)nextBtn.onclick=()=>{const idx=allWeeks.indexOf(displayWeekKey);if(idx<allWeeks.length-1){st.editWeek=allWeeks[idx+1];if(allWeeks[idx+1]===currentWeekKey)st.editWeek=null;rTracker(trackerType);}};
$$("[data-editweek]",m).forEach(c=>c.onclick=()=>{st.editWeek=c.dataset.editweek;st.tt="now";rTracker(trackerType);});
const svB=$("#svW",m);if(svB)svB.onclick=()=>{const dd=gT(trackerType);const n=($("#nt",m)||{}).value||"";if(!dd.w[displayWeekKey])dd.w[displayWeekKey]={d:{},n:"",sv:false};dd.w[displayWeekKey].n=n;dd.w[displayWeekKey].sv=true;dd.w[displayWeekKey].at=ns;sT(dd,trackerType);rTracker(trackerType);};
const rb=$("#resetT",m);if(rb)rb.onclick=()=>{if(confirm(`Clear all ${typeLabel.toLowerCase()} tracking data?`)){const key=trackerType==="hair"?"jn4_hair":trackerType==="beard"?"jn4_beard":"jn4";localStorage.removeItem(key);st.tt="now";st.editWeek=null;rTracker(trackerType)}};
}
